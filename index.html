<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0F5132">
  <meta name="description" content="LocaSyn — Trouvez, louez et gérez votre logement au Bénin en toute confiance">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="LocaSyn">

  <title>LocaSyn — Marketplace immobilière au Bénin</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <!-- LocaSyn CSS -->
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/screens.css">

  <!-- Variables d'environnement -->
  <script>
    window.__ENV = {
      SUPABASE_URL: 'https://pcbaokqjlasfgwomotyt.supabase.co',
      SUPABASE_ANON_KEY: 'sb_publishable_aKOdLX1HwleVq7z9BoExsw_OndKclKd',
      KKIAPAY_PUBLIC_KEY: 'YOUR_KKIAPAY_KEY',
    };
  </script>
</head>
<body>
  <!-- Wrapper principal (grid sur desktop) -->
  <div id="app-wrapper">

    <!-- Navigation persistante (bottom-bar mobile / sidebar desktop) -->
    <nav class="bottom-nav" id="bottom-nav">
      <a class="bottom-nav-item active" data-route="home" href="#home">
        <span class="bottom-nav-icon"><i data-lucide="home" class="icon icon--lg"></i></span>
        <span class="bottom-nav-label">Accueil</span>
      </a>
      <a class="bottom-nav-item" data-route="search" href="#search">
        <span class="bottom-nav-icon"><i data-lucide="search" class="icon icon--lg"></i></span>
        <span class="bottom-nav-label">Recherche</span>
      </a>
      <a class="bottom-nav-item" data-route="publish" href="#publish">
        <span class="bottom-nav-icon"><i data-lucide="plus" class="icon icon--lg"></i></span>
        <span class="bottom-nav-label">Publier</span>
      </a>
      <a class="bottom-nav-item" data-route="messages" href="#messages">
        <span class="bottom-nav-icon"><i data-lucide="message-circle" class="icon icon--lg"></i></span>
        <span class="bottom-nav-label">Messages</span>
        <span class="bottom-nav-badge" id="msg-badge" style="display:none">0</span>
      </a>
      <a class="bottom-nav-item" data-route="profile" href="#profile">
        <span class="bottom-nav-icon"><i data-lucide="user" class="icon icon--lg"></i></span>
        <span class="bottom-nav-label">Profil</span>
      </a>
    </nav>

    <!-- Contenu écran (chargé par le router) -->
    <div id="app">
      <div class="loading-overlay" id="initial-loader">
        <div class="spinner spinner-lg"></div>
      </div>
    </div>

  </div><!-- /#app-wrapper -->

  <!-- Toast global -->
  <div id="toast" class="toast"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <!-- App Entry -->
  <script type="module" src="/assets/js/app.js"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
