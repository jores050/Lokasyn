<!-- LocaSyn — Recherche avancée -->
<div class="search-header">
  <div style="display:flex;align-items:center;gap:10px">
    <button onclick="history.back()" style="background:none;border:none;cursor:pointer;flex-shrink:0"><i data-lucide="arrow-left" class="icon icon--lg"></i></button>
    <div class="search-bar" style="flex:1">
      <span class="search-bar-icon"><i data-lucide="search" class="icon"></i></span>
      <input type="text" id="search-input" placeholder="Quartier, ville, type..." autocomplete="off" style="flex:1;border:none;outline:none;background:transparent;font-size:0.9375rem">
    </div>
  </div>

  <div class="search-filters">
    <!-- Filtres avancés -->
    <div class="scroll-x" style="gap:8px;padding:8px 0">
      <select class="form-select" id="filter-type" style="min-width:130px;padding:8px 36px 8px 12px;font-size:0.8125rem">
        <option value="">Tous types</option>
        <option value="chambre">Chambre</option>
        <option value="studio">Studio</option>
        <option value="f2">F2</option>
        <option value="f3">F3</option>
        <option value="f4plus">F4+</option>
        <option value="villa">Villa</option>
        <option value="local">Local</option>
      </select>
      <select class="form-select" id="filter-budget" style="min-width:140px;padding:8px 36px 8px 12px;font-size:0.8125rem">
        <option value="">Budget max</option>
        <option value="15000">≤ 15 000 FCFA</option>
        <option value="25000">≤ 25 000 FCFA</option>
        <option value="40000">≤ 40 000 FCFA</option>
        <option value="60000">≤ 60 000 FCFA</option>
        <option value="100000">≤ 100 000 FCFA</option>
      </select>
    </div>

    <div style="display:flex;align-items:center;gap:12px;padding:4px 0;flex-wrap:wrap">
      <label style="display:flex;align-items:center;gap:6px;font-size:0.8125rem;cursor:pointer;color:var(--ink-mid)">
        <input type="checkbox" id="filter-verifie" style="accent-color:var(--green)"> Vérifié <i data-lucide="badge-check" class="icon icon--sm"></i>
      </label>
      <label style="display:flex;align-items:center;gap:6px;font-size:0.8125rem;cursor:pointer;color:var(--ink-mid)">
        <input type="checkbox" id="filter-meuble" style="accent-color:var(--green)"> Meublé
      </label>
      <label style="display:flex;align-items:center;gap:6px;font-size:0.8125rem;cursor:pointer;color:var(--ink-mid)">
        <input type="checkbox" id="filter-etudiant" style="accent-color:var(--green)"> <i data-lucide="graduation-cap" class="icon icon--sm"></i> Étudiant OK
      </label>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
      <div id="results-count" style="font-size:0.8125rem;color:var(--ink-light)">Recherche en cours...</div>
      <div class="view-toggle" style="min-width:120px">
        <div class="view-toggle-btn active" data-view="list"><i data-lucide="list" class="icon icon--sm"></i> Liste</div>
        <div class="view-toggle-btn" data-view="map"><i data-lucide="map" class="icon icon--sm"></i> Carte</div>
      </div>
    </div>
  </div>
</div>

<!-- Vue liste -->
<div class="listings-grid" id="search-results" style="padding-top:12px">
  <div class="card"><div class="skeleton" style="aspect-ratio:4/3"></div><div class="card-body"><div class="skeleton" style="height:20px;margin-bottom:8px"></div><div class="skeleton" style="height:14px;width:60%"></div></div></div>
  <div class="card"><div class="skeleton" style="aspect-ratio:4/3"></div><div class="card-body"><div class="skeleton" style="height:20px;margin-bottom:8px"></div><div class="skeleton" style="height:14px;width:60%"></div></div></div>
  <div class="card"><div class="skeleton" style="aspect-ratio:4/3"></div><div class="card-body"><div class="skeleton" style="height:20px;margin-bottom:8px"></div><div class="skeleton" style="height:14px;width:60%"></div></div></div>
  <div class="card"><div class="skeleton" style="aspect-ratio:4/3"></div><div class="card-body"><div class="skeleton" style="height:20px;margin-bottom:8px"></div><div class="skeleton" style="height:14px;width:60%"></div></div></div>
</div>

<!-- Vue carte -->
<div id="map-view">
  <div id="map-leaflet" style="width:100%;height:100%"></div>
</div>


<script type="module">
  import { initSearch } from '/assets/js/modules/marketplace.js';
  const params = window.__routeParams || {};
  initSearch(params);
</script>
