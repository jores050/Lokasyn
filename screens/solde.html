<!-- LocaSyn — Solde & Retraits bailleur -->
<div class="navbar">
  <button class="navbar-back" onclick="history.back()"><i data-lucide="arrow-left" class="icon"></i></button>
  <div class="navbar-title">Mon solde</div>
</div>

<div id="solde-root">
  <div style="display:flex;justify-content:center;padding:60px"><div class="spinner spinner-lg"></div></div>
</div>

<!-- Modale demande de retrait -->
<div class="modal-overlay" id="retrait-modal" onclick="if(event.target===this)fermerModaleRetrait()">
  <div class="bottom-sheet">
    <div class="bottom-sheet-handle"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h3 style="font-size:1.125rem;font-weight:600">Demander un retrait</h3>
      <button onclick="fermerModaleRetrait()" style="background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center"><i data-lucide="x" class="icon"></i></button>
    </div>
    <div style="font-size:0.875rem;color:var(--ink-mid);margin-bottom:16px">
      Solde disponible : <span id="retrait-solde-dispo" style="font-weight:700;color:var(--green)">0 FCFA</span>
    </div>

    <label class="form-label">Montant à retirer (FCFA)</label>
    <input id="retrait-montant" type="number" class="form-input" placeholder="ex: 5000" min="500" style="margin-bottom:12px">

    <label class="form-label">Moyen de paiement</label>
    <div style="display:flex;gap:10px;margin-bottom:12px">
      <label style="flex:1;display:flex;align-items:center;gap:8px;padding:12px;border:2px solid var(--border);border-radius:var(--radius);cursor:pointer">
        <input type="radio" name="moyenRetrait" value="mtn_momo"> MTN MoMo
      </label>
      <label style="flex:1;display:flex;align-items:center;gap:8px;padding:12px;border:2px solid var(--border);border-radius:var(--radius);cursor:pointer">
        <input type="radio" name="moyenRetrait" value="moov_money"> Moov Money
      </label>
    </div>

    <label class="form-label">Numéro de réception</label>
    <input id="retrait-telephone" type="tel" class="form-input" placeholder="ex: 97000000" style="margin-bottom:16px">

    <div style="font-size:0.8125rem;color:var(--ink-light);background:var(--sand);border-radius:var(--radius-sm);padding:10px;margin-bottom:16px">
      <i data-lucide="info" class="icon icon--sm"></i> Les retraits sont traités manuellement dans les 24-48h ouvrées.
    </div>

    <button class="btn btn-primary w-full" onclick="soumettreRetrait()">
      <i data-lucide="send" class="icon icon--sm"></i> Envoyer la demande
    </button>
  </div>
</div>

<script type="module">
  import { init } from '/assets/js/modules/solde.js';
  init();
</script>
